packages:
  - "packages/*"
  - "apps/*"

# Keep a single React instance across the workspace and the linked SurveyJS
# builds (prevents "Invalid hook call"). pnpm 11 reads overrides from here, not
# from package.json.
overrides:
  react: ^19.0.0
  react-dom: ^19.0.0

# Native build scripts we explicitly allow (Next.js image optimization).
onlyBuiltDependencies:
  - sharp

allowBuilds:
  sharp: set this to true or false
